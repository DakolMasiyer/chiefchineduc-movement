<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — CCM 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0f1a12;color:white;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
    .wrap{max-width:500px;}
    .num{font-family:'Cormorant Garamond',serif;font-size:120px;font-weight:700;color:rgba(200,146,42,0.3);line-height:1;}
    h1{font-family:'Cormorant Garamond',serif;font-size:36px;color:white;margin:16px 0 12px;}
    p{color:rgba(255,255,255,0.5);font-size:15px;margin-bottom:36px;line-height:1.7;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:#c8922a;color:#0f1a12;border-radius:6px;font-weight:700;font-size:14px;text-decoration:none;transition:background 0.2s;}
    .btn:hover{background:#e8b44a;}
    .tagline{margin-top:48px;font-size:13px;font-style:italic;color:rgba(200,146,42,0.4);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for does not exist. It may have been moved, or you may have followed a broken link. Let's get you back to the movement.</p>
    <a href="/" class="btn">← Back to Homepage</a>
    <div class="tagline">"From Neglect to Development — It's Okigwe's Time"</div>
  </div>
</body>
</html>
