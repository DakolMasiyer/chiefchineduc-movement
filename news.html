<!DOCTYPE html>

  <meta charset="UTF-8">

  <meta name="description" content="Latest news, press releases, and updates from the Chief Chukwuonye Movement — Okigwe Zone Senate 2027.">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .filter-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:40px; }
    .filter-btn { padding:8px 20px; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer; transition:var(--transition); border:1px solid var(--border); color:var(--ink-muted); background:white; font-family:'Outfit',sans-serif; }
    .filter-btn:hover, .filter-btn.active { background:var(--green); color:white; border-color:var(--green); }
    /* MODAL */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(15,26,18,0.85); z-index:2000; backdrop-filter:blur(8px); align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:white; border-radius:var(--radius-lg); max-width:760px; width:100%; position:relative; overflow:hidden; }
    .modal-header { background:var(--green); padding:40px; position:relative; }
    .modal-header::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 80% 20%, rgba(200,146,42,0.15), transparent 60%); }
    .modal-close { position:absolute; top:20px; right:20px; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.1); color:white; font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:1px solid rgba(255,255,255,0.2); transition:var(--transition); z-index:1; }
    .modal-close:hover { background:rgba(255,255,255,0.2); }
    .modal-cat { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gold-light); margin-bottom:10px; position:relative; z-index:1; }
    .modal-title { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,3vw,34px); font-weight:700; color:white; position:relative; z-index:1; line-height:1.2; }
    .modal-date { font-family:'DM Mono',monospace; font-size:11px; color:rgba(255,255,255,0.4); margin-top:12px; position:relative; z-index:1; }
    .modal-body { padding:40px; }
    .modal-body p { font-size:15px; color:var(--ink-mid); margin-bottom:16px; line-height:1.8; }
    .modal-body ul { padding-left:20px; margin-bottom:16px; }
    .modal-body ul li { font-size:15px; color:var(--ink-mid); margin-bottom:8px; }
    .modal-footer { padding:24px 40px; border-top:1px solid var(--border); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .modal-footer .share-label { font-size:12px; color:var(--ink-muted); font-family:'DM Mono',monospace; }
    #modal-tags { display:flex; gap:8px; flex-wrap:wrap; margin:0 40px 24px; }
  </style>
</head>
